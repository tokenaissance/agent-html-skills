name: version-check

# Enforces the rule in CLAUDE.md: any change under plugins/html-skills/ must bump the
# plugin version and update the changelog. Always runs (so it can be a required check);
# only *enforces* when versionable plugin files changed.
#
# No repo checkout — reads the PR's changed files and the two plugin.json versions via
# the GitHub API, so the job does no git clone and finishes in ~1s.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Require a version bump + changelog when the plugin changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          PLUGIN=plugins/html-skills/.claude-plugin/plugin.json
          CHANGELOG=plugins/html-skills/CHANGELOG.md

          # Files changed in this PR (paginated; safe — paths, used only with grep).
          files=$(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename')

          # Versionable change = anything under plugins/html-skills/ except the changelog.
          changed=$(printf '%s\n' "$files" | grep '^plugins/html-skills/' | grep -v "^${CHANGELOG}\$" || true)
          if [ -z "$changed" ]; then
            echo "No versionable plugin changes in this PR — nothing to enforce."
            exit 0
          fi
          echo "Versionable changes detected:"
          printf '%s\n' "$changed" | sed 's/^/  - /'

          ver() { gh api "repos/$REPO/contents/$PLUGIN?ref=$1" --jq '.content' | base64 -d | jq -r .version; }
          base_ver=$(ver "$BASE_SHA")
          head_ver=$(ver "$HEAD_SHA")
          echo "plugin.json version: $base_ver -> $head_ver"

          if [ "$base_ver" = "$head_ver" ]; then
            echo "::error file=${PLUGIN}::plugins/html-skills changed but the version is still ${head_ver}. Bump it (minor x.Y.0 for new skills/behaviour, patch x.y.Z for small fixes) and update the CHANGELOG. See CLAUDE.md."
            exit 1
          fi
          if [ "$(printf '%s\n%s\n' "$base_ver" "$head_ver" | sort -V | tail -1)" != "$head_ver" ]; then
            echo "::error file=${PLUGIN}::Version must increase: ${base_ver} -> ${head_ver} is not higher."
            exit 1
          fi
          if ! printf '%s\n' "$files" | grep -q "^${CHANGELOG}\$"; then
            echo "::error file=${CHANGELOG}::Version bumped to ${head_ver} but ${CHANGELOG} was not updated in this PR. Add a changelog entry. See CLAUDE.md."
            exit 1
          fi
          echo "OK: version ${base_ver} -> ${head_ver} with a changelog update."
